<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UTOPIA — Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg:        #F5F4F0;
  --bg2:       #ECEAE4;
  --surface:   #FDFCF9;
  --ink:       #1A1814;
  --ink2:      rgba(26,24,20,0.55);
  --ink3:      rgba(26,24,20,0.32);
  --ink4:      rgba(26,24,20,0.08);
  --line:      rgba(26,24,20,0.10);
  --line2:     rgba(26,24,20,0.18);

  --red:       #C0392B;
  --red-light: #F9EAE8;
  --amber:     #A0522D;
  --amber-light:#FBF1E8;
  --green:     #2E6B4F;
  --green-light:#E6F2EB;

  --accent:    #1A1814;

  --r-card:    20px;
  --r-sm:      12px;
  --r-xs:      8px;
  --ease:      cubic-bezier(0.22, 0.61, 0.36, 1);
  --snappy:    cubic-bezier(0.16, 1, 0.3, 1);

  --font-disp: 'DM Serif Display', Georgia, serif;
  --font-ui:   'DM Sans', system-ui, sans-serif;

  --sh-sm:     0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
  --sh-md:     0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  --sh-lg:     0 16px 48px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --bg:        #111110;
  --bg2:       #1A1917;
  --surface:   #211F1D;
  --ink:       #F0EDE6;
  --ink2:      rgba(240,237,230,0.55);
  --ink3:      rgba(240,237,230,0.30);
  --ink4:      rgba(240,237,230,0.08);
  --line:      rgba(240,237,230,0.08);
  --line2:     rgba(240,237,230,0.14);

  --red:       #E07060;
  --red-light: #2A1C1A;
  --amber:     #D4956A;
  --amber-light:#271E15;
  --green:     #5BA882;
  --green-light:#152519;

  --sh-sm:     0 1px 4px rgba(0,0,0,0.4);
  --sh-md:     0 4px 20px rgba(0,0,0,0.55);
  --sh-lg:     0 16px 48px rgba(0,0,0,0.7);
}

/* ━━━━━ RESET ━━━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-weight: 400;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background 0.35s var(--ease), color 0.35s var(--ease);
}

/* ━━━━━ VIEW SYSTEM ━━━━━ */
.view { display: none; min-height: 100dvh; flex-direction: column; }
.view.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.5s var(--snappy) both; }

/* ━━━━━ THEME TOGGLE ━━━━━ */
#theme-toggle {
  position: fixed; top: 20px; right: 20px; z-index: 999;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--line2); background: var(--surface);
  box-shadow: var(--sh-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s var(--ease), background 0.3s, border-color 0.3s;
  color: var(--ink2);
}
#theme-toggle:hover { transform: scale(1.1); color: var(--ink); }
#theme-toggle:active { transform: scale(0.9); }
#theme-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
.t-sun { display: none; } .t-moon { display: block; }
[data-theme="dark"] .t-sun { display: block; }
[data-theme="dark"] .t-moon { display: none; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   LOGIN
━━━━━━━━━━━━━━━━━━━━━━━━ */
#view-login {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--bg);
}

/* Decorative rule top-left */
#view-login::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 3px; height: 100vh;
  background: var(--ink);
  opacity: 0.08;
}

.login-wrap {
  width: 100%;
  max-width: 420px;
  animation: fadeUp 0.6s var(--snappy) both;
}

.login-header {
  margin-bottom: 32px;
}

.login-overline {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.login-overline-bar {
  width: 28px; height: 2px;
  background: var(--ink);
  opacity: 0.3;
}
.login-overline-text {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
}

.login-headline {
  font-family: var(--font-disp);
  font-size: clamp(42px, 10vw, 60px);
  line-height: 1.0;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.login-headline em {
  font-style: italic;
  color: var(--ink2);
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-card);
  box-shadow: var(--sh-lg);
  overflow: hidden;
}

.login-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px;
  border-bottom: 1px solid var(--line);
}

.wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.wordmark-badge {
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp);
  font-size: 14px;
  font-weight: 400;
}
.wordmark-name {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
}
.login-card-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink3);
  border: 1px solid var(--line2);
  padding: 4px 8px;
  border-radius: 100px;
}

.login-fields {
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink3);
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-xs);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.field input::placeholder { color: var(--ink3); font-weight: 400; }
.field input:focus {
  border-color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--ink4);
}

.college-toggle { display: flex; gap: 6px; }
.college-toggle input[type="radio"] { display: none; }
.college-toggle label {
  flex: 1;
  text-align: center;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-xs);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink3);
  letter-spacing: 0.05em;
  transition: all 0.2s var(--ease);
}
.college-toggle input:checked + label {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.college-toggle label:hover { color: var(--ink); border-color: var(--ink2); }

.login-footer { padding: 0 28px 28px; }

.btn-cta {
  width: 100%;
  background: var(--ink);
  color: var(--surface);
  border: none;
  font-family: var(--font-disp);
  font-size: 16px;
  font-style: italic;
  letter-spacing: 0.01em;
  padding: 17px 24px;
  border-radius: var(--r-xs);
  cursor: pointer;
  transition: transform 0.2s var(--ease), box-shadow 0.2s, opacity 0.2s;
}
.btn-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
.btn-cta:active { transform: scale(0.98); box-shadow: none; }
.btn-cta:disabled { opacity: 0.35; pointer-events: none; }

.err-banner {
  margin-top: 14px;
  padding: 11px 14px;
  background: var(--red-light);
  border-left: 2px solid var(--red);
  border-radius: 0 var(--r-xs) var(--r-xs) 0;
  font-size: 13px;
  font-weight: 500;
  color: var(--red);
  display: none;
}
.err-banner.show { display: block; animation: fadeUp 0.25s ease; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   LOADING
━━━━━━━━━━━━━━━━━━━━━━━━ */
#view-loading {
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.load-symbol {
  font-family: var(--font-disp);
  font-size: 52px;
  font-style: italic;
  color: var(--ink);
  animation: loadBreath 2s ease-in-out infinite;
}
@keyframes loadBreath {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.96); }
}

.load-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink3);
}

.load-rule {
  width: 64px; height: 1px;
  background: var(--line2);
  position: relative;
  overflow: hidden;
}
.load-rule::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  height: 100%; width: 50%;
  background: var(--ink);
  animation: loadSweep 1.1s var(--ease) infinite;
}
@keyframes loadSweep { 0% { transform: translateX(-150%); } 100% { transform: translateX(300%); } }

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   DASHBOARD
━━━━━━━━━━━━━━━━━━━━━━━━ */
#view-dashboard { padding-bottom: 64px; }

.topnav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
}

.topnav-left { display: flex; align-items: center; gap: 14px; }
.topnav-badge {
  width: 30px; height: 30px;
  background: var(--ink); color: var(--bg);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp);
  font-size: 14px;
  font-style: italic;
}
.topnav-title-group { display: flex; flex-direction: column; }
.page-title {
  font-family: var(--font-disp);
  font-size: 18px;
  font-style: italic;
  line-height: 1.1;
  color: var(--ink);
}
.page-sub { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.08em; }

.topnav-actions { display: flex; gap: 6px; }
.nav-btn {
  width: 36px; height: 36px;
  border-radius: var(--r-xs);
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  box-shadow: var(--sh-sm);
}
.nav-btn:hover { color: var(--ink); background: var(--bg2); border-color: var(--ink2); transform: scale(1.06); }
.nav-btn:active { transform: scale(0.94); }
.nav-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.dash-body {
  max-width: 580px;
  margin: 0 auto;
  width: 100%;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 36px;
}

/* ─── HERO STAT BLOCK ─── */
.hero-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.hero-figure {
  font-family: var(--font-disp);
  font-size: clamp(72px, 18vw, 96px);
  line-height: 0.9;
  letter-spacing: -0.03em;
  color: var(--ink);
}

.hero-figure.text-danger { color: var(--red); }
.hero-figure.text-warn   { color: var(--amber); }
.hero-figure.text-good   { color: var(--green); }

.hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  padding-top: 8px;
}

.hero-status-pill {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.hero-status-pill.danger { background: var(--red-light); color: var(--red); }
.hero-status-pill.warn   { background: var(--amber-light); color: var(--amber); }
.hero-status-pill.good   { background: var(--green-light); color: var(--green); }

.hero-student {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  text-align: right;
}

.hero-rule {
  height: 1px;
  background: var(--line);
}

.hero-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hero-desc {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink2);
}
.hero-overline {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink3);
}

/* ─── SUBJECTS ─── */
.sec-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sec-rule {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.sec-rule-line {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.sec-rule-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink3);
}

.subj-list { display: flex; flex-direction: column; gap: 2px; }

.subj-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: transform 0.2s var(--ease), box-shadow 0.2s, border-color 0.2s;
}
.subj-card:hover { transform: translateY(-1px); box-shadow: var(--sh-md); border-color: var(--line2); }
.subj-card + .subj-card { margin-top: 10px; }

.subj-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.subj-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.subj-name {
  font-family: var(--font-disp);
  font-size: 17px;
  color: var(--ink);
  line-height: 1.2;
}
.subj-classes {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink3);
}

.subj-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.subj-pct {
  font-family: var(--font-disp);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.subj-pct.text-danger { color: var(--red); }
.subj-pct.text-warn   { color: var(--amber); }
.subj-pct.text-good   { color: var(--green); }

.prog-track {
  height: 3px;
  background: var(--bg2);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.1s var(--snappy);
  width: 0;
}
.prog-fill.danger { background: var(--red); }
.prog-fill.warn   { background: var(--amber); }
.prog-fill.good   { background: var(--green); }

.subj-hint {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.subj-hint.text-danger { color: var(--red); }
.subj-hint.text-warn   { color: var(--amber); }
.subj-hint.text-good   { color: var(--green); }
.subj-hint::before {
  content: '';
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.6;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   ERROR
━━━━━━━━━━━━━━━━━━━━━━━━ */
#view-error {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  gap: 14px;
}
.err-symbol {
  font-family: var(--font-disp);
  font-size: 100px;
  font-style: italic;
  line-height: 1;
  color: var(--ink);
  opacity: 0.07;
  margin-bottom: -10px;
}
.err-title {
  font-family: var(--font-disp);
  font-size: 30px;
  color: var(--ink);
}
.err-desc {
  font-size: 15px;
  color: var(--ink2);
  max-width: 260px;
  line-height: 1.65;
}
.btn-back {
  margin-top: 16px;
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: var(--font-disp);
  font-size: 15px;
  font-style: italic;
  padding: 13px 36px;
  border-radius: var(--r-xs);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.btn-back:hover { background: var(--ink); color: var(--surface); }

/* ━━━━━ MISC ━━━━━ */
.is-spinning { animation: spin 0.8s linear infinite !important; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="Toggle theme">
  <svg class="t-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
  <svg class="t-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<!-- LOGIN -->
<div class="view active" id="view-login">
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-overline">
        <div class="login-overline-bar"></div>
        <span class="login-overline-text">Attendance Portal</span>
      </div>
      <div class="login-headline">Know<br>where you<br><em>stand.</em></div>
    </div>
    <div class="login-card">
      <div class="login-card-header">
        <div class="wordmark">
          <div class="wordmark-badge">U</div>
          <span class="wordmark-name">Utopia</span>
        </div>
        <span class="login-card-tag">Sign in</span>
      </div>
      <div class="login-fields">
        <div class="field">
          <label>Roll Number</label>
          <input type="text" id="inp-roll" placeholder="e.g. 24B11EC042" autocomplete="username" autocapitalize="characters" spellcheck="false">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="inp-pass" placeholder="Portal password">
        </div>
        <div class="field">
          <label>College</label>
          <div class="college-toggle">
            <input type="radio" id="col-acet" name="college" value="acet" checked>
            <label for="col-acet">ACET</label>
            <input type="radio" id="col-aus" name="college" value="aus">
            <label for="col-aus">AUS</label>
          </div>
        </div>
      </div>
      <div class="login-footer">
        <button class="btn-cta" id="btn-login">Fetch Attendance</button>
        <div class="err-banner" id="login-error"></div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="view" id="view-loading">
  <div class="load-symbol">U</div>
  <div class="load-rule"></div>
  <div class="load-label" id="loader-text">Signing in…</div>
</div>

<!-- DASHBOARD -->
<div class="view" id="view-dashboard">
  <div class="topnav">
    <div class="topnav-left">
      <div class="topnav-badge">U</div>
      <div class="topnav-title-group">
        <div class="page-title">Attendance</div>
        <div class="page-sub">Overview</div>
      </div>
    </div>
    <div class="topnav-actions">
      <button class="nav-btn" id="btn-refresh" title="Refresh">
        <svg id="refresh-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="nav-btn" id="btn-logout" title="Sign out">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="dash-body">
    <!-- Hero -->
    <div class="hero-block" id="hero-block">
      <div class="hero-top">
        <div class="hero-figure" id="hero-pct">—</div>
        <div class="hero-right">
          <div class="hero-status-pill" id="hero-pill">—</div>
          <div class="hero-student" id="hero-student">Student</div>
        </div>
      </div>
      <div class="hero-rule"></div>
      <div class="hero-meta">
        <div class="hero-desc" id="hero-desc">—</div>
        <div class="hero-overline">Overall</div>
      </div>
    </div>

    <!-- Subjects -->
    <div>
      <div class="sec-rule">
        <div class="sec-rule-line"></div>
        <div class="sec-rule-label">Subjects</div>
        <div class="sec-rule-line"></div>
      </div>
      <div class="subj-list" id="subj-list"></div>
    </div>
  </div>
</div>

<!-- ERROR -->
<div class="view" id="view-error">
  <div class="err-symbol">!</div>
  <div class="err-title" id="err-title">Something went wrong</div>
  <div class="err-desc" id="err-desc">We couldn't fetch your attendance.</div>
  <button class="btn-back" id="btn-err-back">Go back</button>
</div>

<script>
/* ── CONFIG ─────────────────────────────────────────────── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6S2ll3x4LYHd8gs-WzgSOC3Js_FUQTIqXgV_JN3Utkv0_KDPUJ1_D9Ivex2F1aGruJA/exec';

let S = { roll: '', pass: '', college: 'acet', data: null };

/* ── THEME ───────────────────────────────────────────────── */
const html = document.documentElement;
html.setAttribute('data-theme', localStorage.getItem('ut-theme') || 'light');
document.getElementById('theme-toggle').addEventListener('click', () => {
  const n = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', n);
  localStorage.setItem('ut-theme', n);
});

/* ── NAVIGATION ──────────────────────────────────────────── */
let cur = 'view-login';
function show(id) {
  document.getElementById(cur).classList.remove('active');
  const el = document.getElementById(id);
  el.classList.add('active', 'fade-up');
  cur = id;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ── HELPERS ─────────────────────────────────────────────── */
function tier(p) { return p >= 75 ? 'good' : p >= 65 ? 'warn' : 'danger'; }
function tierLabel(p) { return p >= 75 ? 'On track' : p >= 65 ? 'Borderline' : 'Attention'; }

function bunkMsg(att, tot) {
  const need = Math.ceil((0.75 * tot - att) / 0.25);
  if (need > 0) return `Attend ${need} more to reach 75%`;
  const skip = Math.floor((att - 0.75 * tot) / 0.75);
  return skip > 0 ? `Can skip ${skip} more class${skip > 1 ? 'es' : ''}` : 'Exactly at 75%';
}

/* ── RENDER ──────────────────────────────────────────────── */
function renderDashboard(data) {
  const pct = data.overallPercentage;
  const t   = tier(pct);
  const bad = data.subjects.filter(s => s.percentage < 75).length;

  // Hero
  const heroFig = document.getElementById('hero-pct');
  heroFig.textContent = pct.toFixed(1) + '%';
  heroFig.className = `hero-figure text-${t}`;

  const pill = document.getElementById('hero-pill');
  pill.textContent = tierLabel(pct);
  pill.className = `hero-status-pill ${t}`;

  document.getElementById('hero-student').textContent = (data.studentName || 'Student').toUpperCase();
  document.getElementById('hero-desc').textContent =
    bad === 0 ? 'All subjects on track' : `${bad} subject${bad > 1 ? 's' : ''} need${bad === 1 ? 's' : ''} attention`;

  // Subjects
  const list = document.getElementById('subj-list');
  list.innerHTML = '';

  data.subjects.forEach(s => {
    const st   = tier(s.percentage);
    const hint = bunkMsg(s.attendedClasses, s.totalClasses);

    const card = document.createElement('div');
    card.className = 'subj-card';
    card.innerHTML = `
      <div class="subj-top">
        <div class="subj-info">
          <div class="subj-name">${s.subject}</div>
          <div class="subj-classes">${s.attendedClasses} / ${s.totalClasses} attended</div>
        </div>
        <div class="subj-right">
          <div class="subj-pct text-${st}">${s.percentage.toFixed(1)}%</div>
        </div>
      </div>
      <div class="prog-track">
        <div class="prog-fill ${st}" data-w="${Math.min(s.percentage, 100)}"></div>
      </div>
      <div class="subj-hint text-${st}">${hint}</div>
    `;
    list.appendChild(card);
  });

  show('view-dashboard');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.prog-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }));
}

/* ── API FETCH (GAS) ─────────────────────────────────────── */
/*
  GAS web apps redirect on POST, so we use a URL-encoded GET approach
  with the credentials as query params. The script must handle `doGet(e)`
  with e.parameter.rollNumber, e.parameter.password, e.parameter.college.

  If your GAS script uses doPost(e), we POST with application/x-www-form-urlencoded
  and set redirect: 'follow' to handle the 302.
*/
async function doFetch() {
  show('view-loading');

  const loaderText = document.getElementById('loader-text');
  loaderText.textContent = 'Signing in…';

  try {
    // Build form-encoded body
    const params = new URLSearchParams({
      rollNumber: S.roll,
      password:   S.pass,
      college:    S.college,
      mode:       'tillNow'
    });

    // Try POST first (doPost). GAS returns JSON directly.
    const res = await fetch(GAS_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:     params.toString()
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    let json;
    try {
      json = JSON.parse(text);
    } catch {
      throw new Error('Invalid response from server');
    }

    // Support both {ok, data} and {success, data} response shapes
    const ok      = json.ok ?? json.success ?? false;
    const errMsg  = json.error || json.message || 'Unknown error';

    if (!ok) throw new Error(errMsg);

    S.data = json.data;
    renderDashboard(json.data);

  } catch (e) {
    const isCredErr = /credentials|password|roll|invalid|wrong/i.test(e.message);
    document.getElementById('err-title').textContent =
      isCredErr ? 'Wrong credentials' : 'Portal unreachable';
    document.getElementById('err-desc').textContent =
      isCredErr
        ? 'Your roll number or password is incorrect.'
        : 'The portal may be down or taking a break. Try again shortly.';
    show('view-error');
  }
}

/* ── EVENTS ──────────────────────────────────────────────── */
document.getElementById('btn-login').addEventListener('click', async (e) => {
  const r   = document.getElementById('inp-roll').value.trim().toUpperCase();
  const p   = document.getElementById('inp-pass').value;
  const col = document.querySelector('input[name="college"]:checked').value;
  const err = document.getElementById('login-error');

  if (!r || !p) {
    err.textContent = 'Please enter your roll number and password.';
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');
  S.roll = r; S.pass = p; S.college = col;
  e.target.disabled = true;
  await doFetch();
  e.target.disabled = false;
});

document.getElementById('btn-refresh').addEventListener('click', async () => {
  const ic = document.getElementById('refresh-icon');
  ic.classList.add('is-spinning');
  await doFetch();
  ic.classList.remove('is-spinning');
});

document.getElementById('btn-logout').addEventListener('click', () => {
  S = { roll: '', pass: '', college: 'acet', data: null };
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-error').classList.remove('show');
  show('view-login');
});

document.getElementById('btn-err-back').addEventListener('click', () => show('view-login'));
document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});
</script>
</body>
</html>
