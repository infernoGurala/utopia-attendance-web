

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UTOPIA — Attendance Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS (luxury minimal)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg:        #F5F4F0;
  --bg2:       #ECEAE4;
  --surface:   #FDFCF9;
  --ink:       #1A1814;
  --ink2:      rgba(26,24,20,0.55);
  --ink3:      rgba(26,24,20,0.32);
  --ink4:      rgba(26,24,20,0.08);
  --line:      rgba(26,24,20,0.10);
  --line2:     rgba(26,24,20,0.18);

  --red:       #C0392B;
  --red-light: #F9EAE8;
  --amber:     #A0522D;
  --amber-light:#FBF1E8;
  --green:     #2E6B4F;
  --green-light:#E6F2EB;

  --accent:    #1A1814;
  --r-card:    20px;
  --r-sm:      12px;
  --r-xs:      8px;
  --ease:      cubic-bezier(0.22, 0.61, 0.36, 1);
  --snappy:    cubic-bezier(0.16, 1, 0.3, 1);
  --font-disp: 'DM Serif Display', Georgia, serif;
  --font-ui:   'DM Sans', system-ui, sans-serif;
  --sh-sm:     0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
  --sh-md:     0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  --sh-lg:     0 16px 48px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --bg:        #111110;
  --bg2:       #1A1917;
  --surface:   #211F1D;
  --ink:       #F0EDE6;
  --ink2:      rgba(240,237,230,0.55);
  --ink3:      rgba(240,237,230,0.30);
  --ink4:      rgba(240,237,230,0.08);
  --line:      rgba(240,237,230,0.08);
  --line2:     rgba(240,237,230,0.14);
  --red:       #E07060;
  --red-light: #2A1C1A;
  --amber:     #D4956A;
  --amber-light:#271E15;
  --green:     #5BA882;
  --green-light:#152519;
  --sh-sm:     0 1px 4px rgba(0,0,0,0.4);
  --sh-md:     0 4px 20px rgba(0,0,0,0.55);
  --sh-lg:     0 16px 48px rgba(0,0,0,0.7);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-weight: 400;
  line-height: 1.5;
  min-height: 100dvh;
  transition: background 0.35s var(--ease), color 0.35s var(--ease);
}
.view { display: none; min-height: 100dvh; flex-direction: column; }
.view.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.5s var(--snappy) both; }

/* theme toggle */
#theme-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
.t-sun { display: none; } .t-moon { display: block; }
[data-theme="dark"] .t-sun { display: block; }
[data-theme="dark"] .t-moon { display: none; }

/* LOGIN */
#view-login {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--bg);
}
.login-wrap {
  width: 100%;
  max-width: 420px;
  animation: fadeUp 0.6s var(--snappy) both;
}
.login-header { margin-bottom: 32px; }
.login-overline {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.login-overline-bar {
  width: 28px; height: 2px;
  background: var(--ink);
  opacity: 0.3;
}
.login-overline-text {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
}
.login-headline {
  font-family: var(--font-disp);
  font-size: clamp(42px, 10vw, 60px);
  line-height: 1.0;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.login-headline em { font-style: italic; color: var(--ink2); }
.login-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-card);
  box-shadow: var(--sh-lg);
  overflow: hidden;
}
.login-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px;
  border-bottom: 1px solid var(--line);
}
.wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.wordmark-badge {
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp);
  font-size: 14px;
}
.wordmark-name {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.login-card-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink3);
  border: 1px solid var(--line2);
  padding: 4px 8px;
  border-radius: 100px;
}
.login-fields { padding: 28px; display: flex; flex-direction: column; gap: 20px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink3);
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-xs);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--ink4);
}
.college-toggle { display: flex; gap: 6px; }
.college-toggle input[type="radio"] { display: none; }
.college-toggle label {
  flex: 1;
  text-align: center;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-xs);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink3);
  transition: all 0.2s var(--ease);
}
.college-toggle input:checked + label {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.btn-cta {
  width: 100%;
  background: var(--ink);
  color: var(--surface);
  border: none;
  font-family: var(--font-disp);
  font-size: 16px;
  font-style: italic;
  padding: 17px 24px;
  border-radius: var(--r-xs);
  cursor: pointer;
  transition: transform 0.2s var(--ease), box-shadow 0.2s;
}
.btn-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
.btn-cta:active { transform: scale(0.98); }
.err-banner {
  margin-top: 14px;
  padding: 11px 14px;
  background: var(--red-light);
  border-left: 2px solid var(--red);
  border-radius: 0 var(--r-xs) var(--r-xs) 0;
  font-size: 13px;
  font-weight: 500;
  color: var(--red);
  display: none;
}
.err-banner.show { display: block; animation: fadeUp 0.25s ease; }

/* LOADING */
#view-loading {
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.load-symbol {
  font-family: var(--font-disp);
  font-size: 52px;
  font-style: italic;
  animation: loadBreath 2s ease-in-out infinite;
}
@keyframes loadBreath {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.96); }
}
.load-rule {
  width: 64px; height: 1px;
  background: var(--line2);
  position: relative;
  overflow: hidden;
}
.load-rule::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  height: 100%; width: 50%;
  background: var(--ink);
  animation: loadSweep 1.1s var(--ease) infinite;
}
@keyframes loadSweep { 0% { transform: translateX(-150%); } 100% { transform: translateX(300%); } }

/* DASHBOARD */
#view-dashboard { padding-bottom: 64px; }
.topnav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
}
.topnav-left { display: flex; align-items: center; gap: 14px; }
.topnav-actions { display: flex; align-items: center; gap: 6px; }
.topnav-badge {
  width: 30px; height: 30px;
  background: var(--ink); color: var(--bg);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp);
  font-size: 14px;
  font-style: italic;
}
.page-title {
  font-family: var(--font-disp);
  font-size: 18px;
  font-style: italic;
}
.page-sub { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.08em; }
.nav-btn {
  width: 36px; height: 36px;
  border-radius: var(--r-xs);
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.nav-btn:hover { color: var(--ink); background: var(--bg2); transform: scale(1.06); }
.nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; }
.dash-body {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 36px;
}
.hero-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
  background: var(--surface);
  border-radius: var(--r-card);
  padding: 28px 28px;
  border: 1px solid var(--line);
  box-shadow: var(--sh-sm);
}
.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.hero-figure {
  font-family: var(--font-disp);
  font-size: clamp(72px, 15vw, 96px);
  line-height: 0.9;
  letter-spacing: -0.03em;
}
.text-good { color: var(--green); }
.text-warn { color: var(--amber); }
.text-danger { color: var(--red); }
.hero-status-pill {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.hero-status-pill.good { background: var(--green-light); color: var(--green); }
.hero-status-pill.warn { background: var(--amber-light); color: var(--amber); }
.hero-status-pill.danger { background: var(--red-light); color: var(--red); }
.hero-student {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  text-align: right;
}
.hero-rule {
  height: 1px;
  background: var(--line);
}
.hero-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hero-desc {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink2);
}
.sec-rule {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}
.sec-rule-line {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.sec-rule-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink3);
}
.subj-list { display: flex; flex-direction: column; gap: 12px; }
.subj-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: transform 0.2s var(--ease), box-shadow 0.2s;
}
.subj-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); border-color: var(--line2); }
.subj-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.subj-name {
  font-family: var(--font-disp);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.2;
}
.subj-classes {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink3);
}
.subj-pct {
  font-family: var(--font-disp);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.prog-track {
  height: 4px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  width: 0%;
}
.prog-fill.good { background: var(--green); }
.prog-fill.warn { background: var(--amber); }
.prog-fill.danger { background: var(--red); }
.subj-hint {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.subj-hint.text-good { color: var(--green); }
.subj-hint.text-warn { color: var(--amber); }
.subj-hint.text-danger { color: var(--red); }
.subj-hint::before {
  content: '';
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.6;
}
#view-error {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  gap: 14px;
}
.err-symbol {
  font-family: var(--font-disp);
  font-size: 100px;
  font-style: italic;
  opacity: 0.07;
}
.btn-back {
  margin-top: 16px;
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: var(--font-disp);
  font-size: 15px;
  font-style: italic;
  padding: 13px 36px;
  border-radius: var(--r-xs);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { background: var(--ink); color: var(--surface); }
.is-spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div class="view active" id="view-login">
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-overline"><div class="login-overline-bar"></div><span class="login-overline-text">Attendance Portal</span></div>
      <div class="login-headline">Know<br>where you<br><em>stand.</em></div>
    </div>
    <div class="login-card">
      <div class="login-card-header"><div class="wordmark"><div class="wordmark-badge">U</div><span class="wordmark-name">Utopia</span></div><span class="login-card-tag">Sign in</span></div>
      <div class="login-fields">
        <div class="field"><label>Roll Number</label><input type="text" id="inp-roll" placeholder="e.g. 25B11ABXXX" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="inp-pass" placeholder="Portal password"></div>
        <div class="field">
          <label>College</label>
          <div class="college-toggle">
<input type="radio" id="col-aus" name="college" value="aus" checked><label for="col-aus">AUS</label>
<input type="radio" id="col-acet" name="college" value="acet"><label for="col-acet">ACET</label>
          </div>
        </div>
      </div>
      <div class="login-footer">
        <button class="btn-cta" id="btn-login">Fetch Attendance</button>
        <div class="err-banner" id="login-error"></div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING VIEW -->
<div class="view" id="view-loading"><div class="load-symbol">U</div><div class="load-rule"></div><div class="load-label">Contacting server...</div></div>

<!-- DASHBOARD VIEW -->
<div class="view" id="view-dashboard">
  <div class="topnav">
    <div class="topnav-left"><div class="topnav-badge">U</div><div><div class="page-title">Attendance</div><div class="page-sub">Live insight</div></div></div>
    <div class="topnav-actions">
       <button class="nav-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
         <svg class="t-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
         <svg class="t-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
       </button>
       <button class="nav-btn" id="btn-refresh" title="Refresh"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
       <button class="nav-btn" id="btn-logout" title="Sign out"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
     </div>
  </div>
  <div class="dash-body">
    <div class="hero-block" id="hero-block">
      <div class="hero-top"><div class="hero-figure" id="hero-pct">—</div><div class="hero-right"><div class="hero-status-pill" id="hero-pill">—</div><div class="hero-student" id="hero-student">Student</div></div></div>
      <div class="hero-rule"></div>
      <div class="hero-meta"><div class="hero-desc" id="hero-desc">—</div><div class="hero-overline">Overall</div></div>
    </div>
    <div><div class="sec-rule"><div class="sec-rule-line"></div><div class="sec-rule-label">Subjects</div><div class="sec-rule-line"></div></div><div class="subj-list" id="subj-list"></div></div>
  </div>
</div>

<!-- ERROR VIEW -->
<div class="view" id="view-error"><div class="err-symbol">!</div><div class="err-title" id="err-title">Connection issue</div><div class="err-desc" id="err-desc">Unable to fetch your record.</div><button class="btn-back" id="btn-err-back">Back to login</button></div>

<script>
/* ─── DIRECT API INTEGRATION (Given endpoint) ─── */
const PROVIDED_API = 'https://script.google.com/macros/s/AKfycbxqx-c3QUpIgJjjSMGLnIRA18o0csTeN2Jk3M7IyvA_Q-WJcLDwA_3rv2fpaN8xzKikjA/exec';

let state = { roll: '', password: '', college: 'aus', rawData: null };

/* helpers */
function tierClass(percent) { return percent >= 75 ? 'good' : percent >= 65 ? 'warn' : 'danger'; }
function statusLabel(percent) { return percent >= 75 ? 'On track' : percent >= 65 ? 'Borderline' : 'Attention needed'; }
function attendanceAdvice(attended, total) {
  if (total === 0) return 'No classes recorded';
  const currentPer = (attended / total);
  if (currentPer >= 0.75) {
    const maxSkip = Math.floor((attended - 0.75 * total) / 0.75);
    if (maxSkip > 0) return `✓ Can skip ${maxSkip} more class/es`;
    return '✓ Exactly at 75% — careful';
  } else {
    const needed = Math.ceil((0.75 * total - attended) / 0.25);
    return `⚠️ Attend ${needed} more classes to reach 75%`;
  }
}

function renderDashboard(data) {
  const overall = data.overallPercentage || 0;
  const tier = tierClass(overall);
  const totalSubj = data.subjects.length;
  const risky = data.subjects.filter(s => s.percentage < 75).length;
  document.getElementById('hero-pct').textContent = overall.toFixed(1) + '%';
  document.getElementById('hero-pct').className = `hero-figure text-${tier}`;
  const pill = document.getElementById('hero-pill');
  pill.textContent = statusLabel(overall);
  pill.className = `hero-status-pill ${tier}`;
  document.getElementById('hero-student').textContent = (data.studentName || 'STUDENT').toUpperCase();
  document.getElementById('hero-desc').textContent = risky === 0 ? 'All subjects healthy' : `${risky} subject${risky > 1 ? 's' : ''} below 75%`;
  
  const container = document.getElementById('subj-list');
  container.innerHTML = '';
  data.subjects.forEach(sub => {
    if (sub.totalClasses === 0 && sub.percentage === 0) return;
    const perc = sub.percentage;
    const st = tierClass(perc);
    const advice = attendanceAdvice(sub.attendedClasses, sub.totalClasses);
    const card = document.createElement('div');
    card.className = 'subj-card';
    card.innerHTML = `
      <div class="subj-top">
        <div class="subj-info"><div class="subj-name">${escapeHtml(sub.subject)}</div><div class="subj-classes">${sub.attendedClasses} / ${sub.totalClasses} attended</div></div>
        <div class="subj-right"><div class="subj-pct text-${st}">${perc.toFixed(1)}%</div></div>
      </div>
      <div class="prog-track"><div class="prog-fill ${st}" style="width: ${Math.min(perc, 100)}%;"></div></div>
      <div class="subj-hint text-${st}">${escapeHtml(advice)}</div>
    `;
    container.appendChild(card);
  });
  if (data.subjects.filter(s => s.totalClasses === 0).length > 0) {
    const zeroNote = document.createElement('div');
    zeroNote.className = 'subj-card';
    zeroNote.style.opacity = '0.7';
    zeroNote.style.fontSize = '13px';
    zeroNote.innerHTML = `<div class="subj-name" style="font-style:italic;">ℹ️ ${data.subjects.filter(s => s.totalClasses === 0).map(s => s.subject).join(', ')} — no classes reported</div>`;
    container.appendChild(zeroNote);
  }
  show('view-dashboard');
}

function show(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

async function fetchAttendance(roll, password, college) {
  // Build URL exactly as example: curl with rollNumber, password, college
  const url = new URL(PROVIDED_API);
  url.searchParams.append('rollNumber', roll);
  url.searchParams.append('password', password);
  url.searchParams.append('college', college);
  
  const response = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const text = await response.text();
  let json;
  try { json = JSON.parse(text); } catch(e) { throw new Error('Invalid server response'); }
  if (!json.ok) throw new Error(json.error || json.message || 'Authentication failed');
  if (!json.data || !json.data.subjects) throw new Error('Malformed attendance data');
  return json.data;
}

async function performLogin() {
  const errDiv = document.getElementById('login-error');
  errDiv.classList.remove('show');
  const roll = document.getElementById('inp-roll').value.trim().toUpperCase();
  const pass = document.getElementById('inp-pass').value;
  let college = document.querySelector('input[name="college"]:checked').value;
  if (!roll || !pass) {
    errDiv.textContent = 'Roll number and password required';
    errDiv.classList.add('show');
    return false;
  }
  if (college !== 'aus' && college !== 'acet') college = 'aus';
  state.roll = roll; state.password = pass; state.college = college;
  show('view-loading');
  try {
    const attendanceData = await fetchAttendance(roll, pass, college);
    state.rawData = attendanceData;
    renderDashboard(attendanceData);
    return true;
  } catch (error) {
    console.error(error);
    const isCred = /authentication|unauthorized|invalid|wrong|credentials|failed/i.test(error.message);
    document.getElementById('err-title').textContent = isCred ? 'Access denied' : 'Service unavailable';
    document.getElementById('err-desc').textContent = isCred ? 'Roll number or password is incorrect.' : 'Attendance portal might be temporary unreachable.';
    show('view-error');
    return false;
  }
}

async function refreshSession() {
  if (!state.roll || !state.password) {
    show('view-login');
    return;
  }
  const refreshIcon = document.querySelector('#btn-refresh svg');
  refreshIcon?.classList.add('is-spinning');
  try {
    const newData = await fetchAttendance(state.roll, state.password, state.college);
    state.rawData = newData;
    renderDashboard(newData);
  } catch (err) {
    document.getElementById('err-title').textContent = 'Refresh failed';
    document.getElementById('err-desc').textContent = err.message || 'Could not update data';
    show('view-error');
  } finally {
    refreshIcon?.classList.remove('is-spinning');
  }
}

function logout() {
  state = { roll: '', password: '', college: 'aus', rawData: null };
  document.getElementById('inp-pass').value = '';
  document.getElementById('inp-roll').value = '';
  document.getElementById('login-error').classList.remove('show');
  show('view-login');
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

/* event listeners */
document.getElementById('btn-login').addEventListener('click', async (e) => { e.target.disabled = true; await performLogin(); e.target.disabled = false; });
document.getElementById('btn-refresh')?.addEventListener('click', (e) => { refreshSession(); });
document.getElementById('btn-logout')?.addEventListener('click', () => logout());
document.getElementById('btn-err-back')?.addEventListener('click', () => show('view-login'));
document.getElementById('inp-pass')?.addEventListener('keydown', (e) => { if(e.key === 'Enter') document.getElementById('btn-login').click(); });

// theme persistence
const htmlTag = document.documentElement;
const saved = localStorage.getItem('ut-theme');
if (saved && (saved === 'light' || saved === 'dark')) htmlTag.setAttribute('data-theme', saved);
else htmlTag.setAttribute('data-theme', 'light');
document.getElementById('theme-toggle').addEventListener('click', () => {
  const curTheme = htmlTag.getAttribute('data-theme');
  const newTheme = curTheme === 'light' ? 'dark' : 'light';
  htmlTag.setAttribute('data-theme', newTheme);
  localStorage.setItem('ut-theme', newTheme);
});
</script>
